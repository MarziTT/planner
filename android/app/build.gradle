plugins {
    id 'com.android.application'
}

// Auto-sync www/ assets before each build
task syncWebAssets(type: Copy) {
    from file("${project.rootDir}/../www")
    into file("${projectDir}/src/main/assets")
    include "**/*.html", "**/*.css", "**/*.js", "**/*.svg", "**/*.json", "**/*.gif", "**/*.png", "**/*.ico"
}
preBuild.dependsOn syncWebAssets

android {
    namespace 'com.pixelplanner.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.pixelplanner.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
