<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>语程</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body data-theme="dark">


<!-- ===== Login / Register Screen ===== -->
<div id="loginScreen">
  <div class="login-card">
    <h1>语程</h1>
    <p class="login-sub" id="loginSub">登录以继续</p>
    <div class="field" id="confirmField" style="display:none">
      <label>确认密码</label>
      <input type="password" id="regConfirmPw" placeholder="再次输入密码" autocomplete="off">
    </div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="off">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPw" placeholder="请输入密码" autocomplete="off">
    </div>
    <p class="login-err" id="loginErr"></p>
    <button class="btn-primary" id="loginSubmitBtn" onclick="handleAuth()">登 录</button>
    <button class="btn-text" id="toggleModeBtn" onclick="toggleAuthMode()">没有账号？去注册</button>
  </div>
</div>

<!-- ===== Questionnaire Overlay ===== -->
<div id="questionnaireOverlay" style="display:none">
  <div class="quiz-card">
    <h2 id="quizTitle">完善你的信息</h2>
    <p class="quiz-sub" id="quizSub">帮助我们为你定制更好的体验</p>
    <div class="quiz-progress" id="quizDots"></div>
    <div class="quiz-q" id="quizQ"></div>
    <div class="quiz-opts" id="quizOpts"></div>
    <button class="btn-skip" id="quizSkip" onclick="quizSkip()">跳过</button>
  </div>
</div>


<div id="mainApp">
<div id="kamenParticles"></div>


<!-- ===== Tag Picker Overlay ===== -->
<div id="tagPickOverlay">
  <div class="tag-pick-card">
    <h3>选择标签</h3>
    <div class="tag-pick-list" id="tagPickList"></div>
    <div class="tag-pick-add-row">
      <input type="text" id="tagPickNewName" placeholder="新标签名称" maxlength="10">
      <input type="text" id="tagPickNewEmoji" placeholder="😊" maxlength="4" style="width:56px;text-align:center;">
      <select id="tagPickNewColor">
        <option value="#4A90D9">蓝</option>
        <option value="#50C878">绿</option>
        <option value="#F5A623">橙</option>
        <option value="#E85D75">红</option>
        <option value="#9B59B6">紫</option>
        <option value="#1ABC9C">青</option>
        <option value="#E67E22">橘</option>
        <option value="#3498DB">宝蓝</option>
      </select>
    </div>
    <div class="tag-pick-actions">
      <button class="btn-cancel" onclick="closeTagPicker()">取消</button>
      <button class="btn-confirm" onclick="confirmTagPick()">确认</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast"></div>


<div id="appRoot">
  <!-- Top Bar -->
  <header id="topBar">
    <div style="display:flex;flex-direction:column;">
      <div class="date-main" id="liveClock">00:00</div>
      <div class="date-sub" id="liveDate">6月18日 星期四</div>
    </div>
    <div id="headerActions">
      <button class="icon-btn" onclick="toggleSettings()" title="设置">&#x2699;</button>
      <button class="icon-btn" onclick="openCalendar()" title="日历">&#x1F4C5;</button>
    </div>
  </header>

  <!-- Progress Section -->
  <div id="progressSection">
    <div id="pgBarWrap"><div id="pgBarFill" style="width:0%"></div></div>
    <div id="overviewCard">
      <span>今日</span><span class="cnt" id="totalCount">0</span><span>个行程</span>
      <span class="sep">/</span>
      <span>已完成</span><span class="cnt" id="doneCount">0</span>
      <span class="sep">·</span>
      <span>剩余</span><span class="cnt" id="remainCount">0</span>
    </div>
  </div>

  <!-- GIF Gallery (kamen only) -->
  <div id="gifGallery" style="display:none;"></div>


    <!-- Voice Zone (v3.3) -->
    <div class="voice-zone-wrap" id="voiceZone">
      <div class="voice-ring" onclick="toggleVoiceZone()">
        <div class="voice-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </div>
      <div class="voice-hint" id="voiceHint">点击开始语音记录</div>

      <div class="text-input-row">
        <input type="text" id="voiceTextInput" placeholder="或直接打字输入..." onkeydown="if(event.key==='Enter')submitVoiceText()">
        <button class="text-submit" onclick="submitVoiceText()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="section-label-v3"><span>今天</span></div>

  <!-- Card Stream -->
  <main id="cardStream">
    <div class="empty-state"><div class="empty-icon">&#x1F4C3;</div><div>今天还没有行程</div></div>
  </main>

  <!-- Confirm Overlay (v3.3) -->
  <div class="confirm-voice-overlay" id="confirmVoiceOverlay">
    <div class="confirm-card">
      <h2>确认这条待办？</h2>
      <div class="subtitle">AI 已为你解析语音内容</div>
      <div class="confirm-fields">
        <div class="confirm-row">
          <label>时间</label>
          <input type="time" id="cfmVoiceTime" value="09:00">
        </div>
        <div class="confirm-row">
          <label>事项</label>
          <input type="text" id="cfmVoiceTitle" placeholder="输入待办事项">
        </div>
        <div class="confirm-row">
          <label>标签</label>
          <div class="tag-chips" id="cfmVoiceTags">
          </div>
        </div>
      </div>
      <div class="confirm-actions">
        <button class="btn-secondary" onclick="closeVoiceConfirm()">取消</button>
        <button class="btn-primary" onclick="confirmVoiceTask()">确认添加</button>
      </div>
    </div>
  </div>

</div>

<!-- FAB -->
<button id="fabBtn" onclick="openAddPanel()">+</button>

<!-- Calendar Overlay + Panel -->
<div class="ovl" id="calOvl" onclick="closeCalendar()"></div>
<div class="slide-pnl" id="calPnl">
  <div class="pnl-hd"><span class="pnl-ttl">日历</span><button class="pnl-cls" onclick="closeCalendar()">&times;</button></div>
  <div class="pnl-cal">
    <div class="pnl-mnav">
      <button class="pnl-mbtn" onclick="pnlNav(-1)">&#x2039;</button>
      <span class="pnl-mlbl" id="pnlMLbl"></span>
      <button class="pnl-mbtn" onclick="pnlNav(1)">&#x203A;</button>
    </div>
    <div class="pnl-wk"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="pnl-dys" id="pnlDays"></div>
  </div>
  <div class="up-sec"><div class="up-ttl">即将到来</div><div id="upDays"></div></div>
</div>

<!-- Add Panel Overlay + Panel -->
<div class="ovl" id="addOvl" onclick="closeAddPanel()"></div>
<div id="addPanel">
  <div class="add-hdl"></div>
  <div class="add-ttl">添加行程</div>
  <div class="tm-quick" id="tmQuick">
    <button class="tm-qbtn" onclick="setQuickTm('08:00',this)">上午 8:00</button>
    <button class="tm-qbtn" onclick="setQuickTm('14:00',this)">下午 2:00</button>
    <button class="tm-qbtn" onclick="setQuickTm('19:00',this)">晚上 7:00</button>
  </div>
  <div class="tm-fine"><label>时间</label><input type="time" id="addTm" value="09:00"></div>
  <div class="add-ia">
    <input type="text" id="addCt" placeholder="行程内容..." onkeydown="if(event.key==='Enter')doAdd()">
    <button class="add-mic" id="addMicBtn" onclick="toggleMic()" title="语音输入">&#x1F3A4;</button>
  </div>
  <div class="add-tgs" id="addTgs">
    <button class="add-tbtn sel" onclick="setAddTg('工作',this)">工作</button>
    <button class="add-tbtn" onclick="setAddTg('学习',this)">学习</button>
    <button class="add-tbtn" onclick="setAddTg('生活',this)">生活</button>
  </div>
  <button class="add-sub" id="addSubBtn" onclick="doAdd()">添加</button>
  <div id="addVoiceRes"></div>
</div>

<!-- Settings Panel -->
<div class="ovl" id="setOvl" onclick="closeSettings()"></div>
<div class="slide-pnl" id="setPnl">
  <div class="pnl-hd"><span class="pnl-ttl">设置</span><button class="pnl-cls" onclick="closeSettings()">&times;</button></div>
  <div class="set-sec">
    <div class="set-sttl">主题</div>
    <div class="th-grid" id="thGrid">
      <div class="th-opt" onclick="setTh('dark')" data-th="dark"><div class="th-dots"><span style="background:#3b82f6"></span><span style="background:#6366f1"></span><span style="background:#0f172a"></span></div><div class="th-nm">暗色专业</div><div class="th-dsc">蓝紫 · 深色</div></div>
      <div class="th-opt" onclick="setTh('warm')" data-th="warm"><div class="th-dots"><span style="background:#f97316"></span><span style="background:#ef4444"></span><span style="background:#fffaf5"></span></div><div class="th-nm">暖色活力</div><div class="th-dsc">橙红 · 米白</div></div>
      <div class="th-opt" onclick="setTh('clean')" data-th="clean"><div class="th-dots"><span style="background:#64748b"></span><span style="background:#f8fafc"></span><span style="background:#e2e8f0"></span></div><div class="th-nm">极简白灰</div><div class="th-dsc">灰蓝 · 简洁</div></div>
      <div class="th-opt" onclick="setTh('brutal')" data-th="brutal"><div class="th-dots"><span style="background:#000"></span><span style="background:#fff;border:1px solid #000"></span><span style="background:#000"></span></div><div class="th-nm">粗野主义</div><div class="th-dsc">黑白 · 等宽</div></div>
      <div class="th-opt" onclick="setTh('kamen')" data-th="kamen"><div class="th-dots"><span style="background:#ef4444"></span><span style="background:#1a1020"></span><span style="background:#ef4444"></span></div><div class="th-nm">假面骑士ZZZ</div><div class="th-dsc">霓虹 · 暗紫</div></div>
    </div>
  </div>
  <div class="set-sec">
    <div class="set-sttl">数据</div>
    <button class="set-btn" onclick="doExport()">&#x1F4E4; 导出数据</button>
    <button class="set-btn" onclick="document.getElementById('impF').click()">&#x1F4E5; 导入数据</button>
    <input type="file" id="impF" accept=".json" style="display:none" onchange="doImport(event)">
    <button class="set-btn" onclick="doChkUpdate()">&#x1F504; 检查更新</button>
    <button class="set-btn dng" onclick="doClearAll()">&#x1F5D1; 清除所有数据</button>
  </div>
</div>

<!-- Old UI elements kept for JS compatibility, hidden via CSS -->
<div id="viewMonth" style="display:none;"></div>
<div id="viewWeek" style="display:none;"></div>
<div id="viewDay" style="display:none;"></div>
<div id="viewTraining" style="display:none;"></div>
<div id="calendarGrid"></div>
<div id="monthNav"></div>
<div id="viewTabs"></div>
<div id="dayHeader"></div>
<div id="timeline"></div>
<div id="eventList"></div>
<div id="modalOverlay" style="display:none;"></div>
<div id="searchBar" style="display:none;"></div>
<div id="weatherBar"></div>
<div id="reportReminder" style="display:none;"></div>
<div id="statsPanel"></div>
<div id="cornerCarousel" style="display:none;"></div>
<div id="fitnessTemplateGrid" style="display:none;"></div>
<div id="trainingSelf" style="display:none;"></div>
<div id="trainingPT" style="display:none;"></div>
<div id="onboardOverlay" style="display:none;"></div>
<div id="importToast" style="display:none;"></div>
<div id="updateDialogContainer"></div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/calendar.js"></script>
<script src="js/events.js"></script>
<script src="js/render.js"></script>
<script src="js/voice.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/notify.js" defer></script>
<script src="js/app.js" defer></script>

</body>
</html>
